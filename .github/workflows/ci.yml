# Test CI. Runs on every push to main and on every pull request, so an agent-authored PR
# always carries a pass/fail signal. `claude-review.yml` has `actions: read` and reads this
# result when reviewing.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev deps
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Run tests
        run: pytest
